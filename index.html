<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera rig with controllers -->
      <a-entity id="rig" position="0 1.6 0">
        <a-camera></a-camera>
        <a-entity laser-controls="hand: right"></a-entity>
        <a-entity laser-controls="hand: left"></a-entity>
      </a-entity>

      <!-- Lighting -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="spot" position="0 5 -3" intensity="1" angle="30"></a-light>
      <a-sky color="#000000"></a-sky>

      <!-- Assets -->
      <a-assets>
        <video id="reel" src="reel.mp4" autoplay loop crossorigin="anonymous"></video>
      </a-assets>

      <!-- Main Video (vertical like a Reel) -->
      <a-video
        src="#reel"
        width="1.1" height="2"
        position="0 1.6 -5"
        rotation="0 0 0">
      </a-video>

      <!-- Reflection (flipped, semi-transparent) -->
      <a-video
        src="#reel"
        width="1.1" height="2"
        position="0 0.1 -5"
        rotation="180 0 0"
        opacity="0.15">
      </a-video>

      <!-- Top Media Controls (icons are text placeholders) -->
      <a-text
        value="🔇   ⛶   ✖︎"
        align="center"
        position="0 2.4 -1"
        color="#AAA"
        width="2">
      </a-text>

      <!-- Bottom Username + Metadata -->
      <a-text
        value="@emannyw     1h        ..."
        align="center"
        position="0 1.0 -1"
        color="#888"
        width="2">
      </a-text>
    </a-scene>
  </body>
</html>
