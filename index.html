<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Starter</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: true">
      <!-- Default camera + controllers -->
      <a-entity id="rig" position="0 1.6 0">
        <a-camera></a-camera>
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <!-- Background and lighting -->
      <a-sky color="#ECECEC"></a-sky>
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" intensity="0.8" position="1 3 2"></a-light>

      <!-- Example video -->
      <a-assets>
        <video id="reel" src="reel.mp4" autoplay loop crossorigin="anonymous"></video>
      </a-assets>
      <a-video src="#reel" width="2" height="1.125" position="0 1.5 -3"></a-video>

      <!-- Example button -->
      <a-box
        color="#FF0080"
        width="0.5" height="0.2" depth="0.1"
        position="0 1 -2"
        class="clickable"
        event-set__enter="_event: mouseenter; color: #FF80C0"
        event-set__leave="_event: mouseleave; color: #FF0080">
      </a-box>
    </a-scene>
  </body>
</html>
