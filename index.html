<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera Rig -->
      <a-entity id="rig" position="0 1.6 0">
        <a-camera></a-camera>
        <a-entity laser-controls="hand: right"></a-entity>
        <a-entity laser-controls="hand: left"></a-entity>
      </a-entity>

      <!-- Lighting -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="spot" position="0 5 -3" intensity="1" angle="30"></a-light>
      <a-sky color="#000000"></a-sky>

      <!-- Assets -->
      <a-assets>
        <video id="reel" src="reel.mp4" autoplay loop crossorigin="anonymous"></video>
      </a-assets>

      <!-- Main Video -->
      <a-video
        src="#reel"
        width="3.2" height="1.8"
        position="0 1.6 -5">
      </a-video>

      <!-- Reflection -->
      <a-video
        src="#reel"
        width="3.2" height="1.8"
        position="0 0.1 -5"
        rotation="180 0 0"
        opacity="0.2">
      </a-video>

      <!-- Top Controls -->
      <a-plane
        color="#333"
        width="1.5" height="0.3"
        position="0 2.0 -1"
        material="shader: flat">
        <a-text value="▶︎  Pause  ⟳" align="center" position="0 0 0.01" color="#fff"></a-text>
      </a-plane>

      <!-- Bottom Username -->
      <a-text
        value="@georgeleonardo"
        color="#888"
        align="center"
        position="0 1.0 -1">
      </a-text>
    </a-scene>
  </body>
</html>
